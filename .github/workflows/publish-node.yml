name: Publish to Comfy registry

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "pyproject.toml"

jobs:
  publish-node:
    name: Publish custom node
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Updated to allow tagging

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Read publish configuration
        id: config
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          publisher_id = str(data.get("tool", {}).get("comfy", {}).get("PublisherId", "")).strip()
          version = str(data.get("project", {}).get("version", "")).strip()

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output_file:
              output_file.write(f"publisher_id={publisher_id}\n")
              output_file.write(f"version={version}\n")

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary_file:
              summary_file.write("## Publish configuration\n\n")
              summary_file.write(f"- Version: `{version or 'missing'}`\n")
              if publisher_id:
                  summary_file.write(f"- PublisherId: `{publisher_id}`\n")
              else:
                  summary_file.write("- PublisherId: missing; update `tool.comfy.PublisherId` in `pyproject.toml` before publishing.\n")
          PY

      - name: Skip publish when PublisherId is missing
        if: ${{ steps.config.outputs.publisher_id == '' }}
        run: echo "Skipping publish because tool.comfy.PublisherId is not configured."

      - name: Publish custom node
        if: ${{ steps.config.outputs.publisher_id != '' }}
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}

      - name: Create and push git tag
        if: ${{ steps.config.outputs.publisher_id != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.config.outputs.version }}" -m "v${{ steps.config.outputs.version }}"
          git push origin "v${{ steps.config.outputs.version }}"
